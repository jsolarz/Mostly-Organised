<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostly Organised</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ffffff;
  --border:   #e0e0e0;
  --text:     #202124;
  --muted:    #5f6368;
  --accent:   #1a73e8;
  --amber:    #f29900;
  --red:      #d93025;
  --hover:    #f1f3f4;
  --drag-ok:  #1a73e8;
  --row-h:    28px;
  --font:     'Google Sans', Roboto, Arial, sans-serif;
}

body {
  font-family: var(--font);
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
  flex-shrink: 0;
}
.header-title { font-weight: 600; font-size: 14px; flex: 1; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 4px; border-radius: 4px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sync bar */
.sync-bar {
  padding: 3px 12px 5px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 20px;
}
.sync-bar.warn  { color: var(--amber); }
.sync-bar.error { color: var(--red); }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.scheme-select {
  font-size: 12px; font-family: var(--font);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 6px; background: var(--bg); cursor: pointer;
}
.search-input {
  flex: 1; font-size: 12px; font-family: var(--font);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; outline: none;
}
.search-input:focus { border-color: var(--accent); }

/* Tree */
.tree { flex: 1; overflow-y: auto; padding: 4px 0 24px; }
.orphan-divider { height: 1px; background: var(--border); margin: 8px 10px; }
.empty-state {
  padding: 32px 16px; text-align: center;
  color: var(--muted); line-height: 1.6; white-space: pre-line;
}

/* Node row */
.node-row {
  display: flex; align-items: center;
  height: var(--row-h); padding-right: 4px;
  position: relative; user-select: none; cursor: default;
}
.node-row:hover { background: var(--hover); }
.node-row.dragging { opacity: 0.35; }

.node-row.drop-before::before {
  content: ''; position: absolute; top: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--drag-ok); border-radius: 1px; z-index: 1;
}
.node-row.drop-after::after {
  content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--drag-ok); border-radius: 1px; z-index: 1;
}
.node-row.drop-child { background: #e8f0fe; border-left: 2px solid var(--drag-ok); }

/* Drag handle */
.drag-handle {
  visibility: hidden; cursor: grab;
  color: var(--muted); padding: 0 3px; flex-shrink: 0;
  font-size: 12px; line-height: var(--row-h);
}
.node-row:hover .drag-handle { visibility: visible; }
.drag-handle:active { cursor: grabbing; }

/* Expand toggle */
.toggle {
  width: 16px; height: var(--row-h);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px; color: var(--muted);
}
.toggle.has-children { cursor: pointer; }
.toggle.leaf { color: transparent; }

/* Status icon */
.status-icon { font-size: 12px; margin-right: 3px; flex-shrink: 0; cursor: pointer; }
.status-icon.stale   { color: var(--amber); }
.status-icon.orphaned { color: var(--red); }

/* Number */
.node-num {
  color: var(--muted); font-size: 11px;
  margin-right: 4px; flex-shrink: 0; white-space: nowrap;
}

/* Label */
.node-label {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; line-height: var(--row-h); cursor: pointer;
}
.node-label.orphaned { text-decoration: line-through; color: var(--muted); }
.node-label.override { font-style: italic; }

/* Inline edit */
.label-input {
  flex: 1; font-size: 13px; font-family: var(--font);
  border: 1px solid var(--accent); border-radius: 2px;
  padding: 0 4px; height: 22px; outline: none;
}

/* Options button */
.options-btn {
  visibility: hidden; background: none; border: none;
  cursor: pointer; padding: 0 4px; color: var(--muted);
  font-size: 16px; line-height: var(--row-h);
  border-radius: 3px; flex-shrink: 0;
}
.node-row:hover .options-btn { visibility: visible; }
.options-btn:hover { background: var(--border); }

/* Busy spinner */
.busy-dot {
  width: 12px; height: 12px; flex-shrink: 0;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}

/* Context menu */
.ctx-menu {
  position: fixed; z-index: 1000;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.13);
  padding: 4px 0; min-width: 188px;
}
.ctx-item { padding: 7px 16px; cursor: pointer; font-size: 13px; }
.ctx-item:hover { background: var(--hover); }
.ctx-item.off { color: var(--muted); cursor: default; pointer-events: none; }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* Stale popover */
.stale-pop {
  position: fixed; z-index: 1001;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.13);
  padding: 12px 14px; max-width: 238px;
  font-size: 12px; line-height: 1.5;
}
.stale-pop p { color: var(--muted); margin-bottom: 6px; }
.stale-pop strong { color: var(--text); }
.stale-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.btn {
  font-size: 11px; font-family: var(--font);
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--bg); color: var(--text);
}
.btn:hover { background: var(--hover); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: #1557b0; }

/* Toast */
.toast {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: #3c4043; color: #fff;
  padding: 7px 14px; border-radius: 4px;
  font-size: 12px; z-index: 2000;
  max-width: 230px; text-align: center;
  pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }
</style>
</head>
<body>
<div id="root"></div>

}

// ── Numbering ─────────────────────────────────────────────────────────────

var ROMAN = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],
             [50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];

function toRoman(n) {
  var r = '';
  ROMAN.forEach(function(p) { while (n >= p[0]) { r += p[1]; n -= p[0]; } });
  return r;
}

function toAlpha(n, up) {
  var az = up ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' : 'abcdefghijklmnopqrstuvwxyz';
  var r = '';
  while (n > 0) { r = az[(n - 1) % 26] + r; n = Math.floor((n - 1) / 26); }
  return r;
}

function seg(n, lv, scheme) {
  if (scheme === 'numeric') return String(n);
  if (scheme === 'legal')   return lv === 1 ? toRoman(n) : lv === 2 ? toAlpha(n, true) : String(n);
  if (scheme === 'outline') return lv === 1 ? toAlpha(n, true) : lv === 2 ? String(n) : lv === 3 ? toAlpha(n, false) : String(n);
  return String(n);
}

function computeNumbers(nodes, scheme) {
  var out = {};
  if (!scheme || scheme === 'none') return out;
  var counters = {};
  nodes.filter(function(n) { return n.status !== 'orphaned' && !n.isExcluded; })
    .forEach(function(node) {
      var lv = node.level;
      Object.keys(counters).forEach(function(k) { if (+k > lv) delete counters[k]; });
      counters[lv] = (counters[lv] || 0) + 1;
      var parts = [];
      for (var l = 1; l <= lv; l++) { if (counters[l]) parts.push(seg(counters[l], l, scheme)); }
      out[node.id] = parts.join('.');
    });
  return out;
}

// ── Tree helpers ──────────────────────────────────────────────────────────

function buildChildMap(nodes) {
  var map = {};
  nodes.forEach(function(n) {
    if (n.isExcluded || n.status === 'orphaned') return;
    var k = n.parentId || '__root__';
    if (!map[k]) map[k] = [];
    map[k].push(n);
  });
  Object.keys(map).forEach(function(k) {
    map[k].sort(function(a, b) { return a.order - b.order; });
  });
  return map;
}

function isDescendant(nodes, candidateId, ancestorId) {
  var byId = {};
  nodes.forEach(function(n) { byId[n.id] = n; });
  var cur = byId[candidateId];
  while (cur && cur.parentId) {
    if (cur.parentId === ancestorId) return true;
    cur = byId[cur.parentId];
  }
  return false;
}

// ── Drag state (mutable object to avoid re-render on every mousemove) ─────

var DRAG = { active: false, sourceId: null };

// ── App ───────────────────────────────────────────────────────────────────

function App() {
  var initState = {
    loading: true, syncing: false, error: null,
    nodes: [], config: { numberingScheme: 'numeric' },
    syncedAt: null
  };
  var stateRef = useRef(initState);
  var setStateWrap = null; // set after first render

  var _s = useState(initState);
  var state = _s[0];
  var _setState = _s[1];

  function setState(updater) {
    _setState(function(prev) {
      var next = typeof updater === 'function' ? updater(prev) : updater;
      stateRef.current = next;
      return next;
    });
  }

  var _search = useState('');
  var search = _search[0]; var setSearch = _search[1];

  var _ctxMenu = useState(null);
  var ctxMenu = _ctxMenu[0]; var setCtxMenu = _ctxMenu[1];

  var _editing = useState(null);
  var editing = _editing[0]; var setEditing = _editing[1];

  var _stalePop = useState(null);
  var stalePop = _stalePop[0]; var setStalePop = _stalePop[1];

  var _dragging = useState(null);
  var dragging = _dragging[0]; var setDragging = _dragging[1];

  var _dropTarget = useState(null);
  var dropTarget = _dropTarget[0]; var setDropTarget = _dropTarget[1];

  var _busy = useState(null);
  var busyId = _busy[0]; var setBusy = _busy[1];

  var _toast = useState(null);
  var toast = _toast[0]; var setToast = _toast[1];
  var toastTimer = useRef(null);

  useEffect(function() { load(); }, []);

  // Close overlays on outside click
  useEffect(function() {
    if (!ctxMenu && !stalePop) return;
    function close() { setCtxMenu(null); setStalePop(null); }
    document.addEventListener('mousedown', close);
    return function() { document.removeEventListener('mousedown', close); };
  }, [ctxMenu, stalePop]);

  function toast_(msg, type) {
    clearTimeout(toastTimer.current);
    setToast({ msg: msg, type: type || 'ok' });
    toastTimer.current = setTimeout(function() { setToast(null); }, 3200);
  }

  // ── Load / sync ──────────────────────────────────────────────────────────

  function load() {
    setState(function(s) { return h({}, s, { syncing: true, error: null }); });
    rpc('getTree', null).then(function(res) {
      setState(function(s) {
        return h({}, s, {
          loading: false, syncing: false,
          nodes: res.nodes || [],
          config: res.config || s.config,
          syncedAt: res.syncedAt
        });
      });
    }).catch(function(e) {
      setState(function(s) { return h({}, s, { loading: false, syncing: false, error: e.message }); });
    });
  }

  function forceSync() {
    setState(function(s) { return h({}, s, { syncing: true }); });
    rpc('forceSync', null).then(function(res) {
      setState(function(s) {
        return h({}, s, { syncing: false, nodes: res.nodes || [], syncedAt: res.syncedAt });
      });
    }).catch(function(e) {
      toast_(e.message, 'error');
      setState(function(s) { return h({}, s, { syncing: false }); });
    });
  }

  // ── Generic mutation call ────────────────────────────────────────────────

  function mutate(fn, params, msg) {
    setBusy(params && (params.sourceId || params.nodeId) || '__any__');
    rpc(fn, params).then(function(res) {
      if (res && res.error) {
        toast_(res.error, 'error');
      } else {
        setState(function(s) {
          return h({}, s, {
            nodes: (res && res.nodes) || s.nodes,
            syncedAt: (res && res.syncedAt) || s.syncedAt
          });
        });
        if (msg) toast_(msg);
      }
      setBusy(null);
    }).catch(function(e) {
      toast_(e.message, 'error');
      setBusy(null);
    });
  }

  // ── Scheme ───────────────────────────────────────────────────────────────

  function onSchemeChange(scheme) {
    setState(function(s) { return h({}, s, { config: h({}, s.config, { numberingScheme: scheme }) }); });
    rpc('saveNumberingScheme', { scheme: scheme }).catch(function() {
      toast_('Could not save scheme', 'error');
    });
  }

  // ── Drag-and-drop ────────────────────────────────────────────────────────

  function onDragStart(e, nodeId) {
    DRAG.active = true;
    DRAG.sourceId = nodeId;
    e.dataTransfer.effectAllowed = 'move';
    setDragging(nodeId);
  }

  function onDragOver(e, nodeId) {
    if (!DRAG.active || DRAG.sourceId === nodeId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var rect = e.currentTarget.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var h = rect.height;
    var pos = y < h * 0.28 ? 'before' : y > h * 0.72 ? 'after' : 'child';
    setDropTarget({ nodeId: nodeId, position: pos });
  }

  function onDragLeave(e) {
    // Only clear if leaving to outside the row
    if (e.currentTarget.contains(e.relatedTarget)) return;
    setDropTarget(null);
  }

  function onDrop(e, nodeId) {
    e.preventDefault();
    var sourceId = DRAG.sourceId;
    var dt = dropTarget;
    DRAG.active = false; DRAG.sourceId = null;
    setDragging(null); setDropTarget(null);
    if (!sourceId || !dt) return;
    if (sourceId === dt.nodeId) return;
    if (isDescendant(stateRef.current.nodes, dt.nodeId, sourceId)) {
      toast_('Cannot move into own descendant', 'error'); return;
    }
    mutate('moveSection', { sourceId: sourceId, targetId: dt.nodeId, position: dt.position }, 'Section moved');
  }

  function onDragEnd() {
    DRAG.active = false; DRAG.sourceId = null;
    setDragging(null); setDropTarget(null);
  }

  // ── Rename ───────────────────────────────────────────────────────────────

  function onRenameConfirm(nodeId, val) {
    setEditing(null);
    if (!val || !val.trim()) return;
    mutate('renameHeading', { nodeId: nodeId, newTitle: val.trim() }, 'Heading renamed');
  }

  // ── Jump to section ──────────────────────────────────────────────────────
  // Apps Script's DocumentApp.setSelection / setCursor API is only available
  // server-side. We call a server function that moves the cursor via
  // DocumentApp, which causes the editor to scroll to that position.

  function onJumpTo(nodeId) {
    rpc('jumpToSection', { nodeId: nodeId }).catch(function(e) {
      toast_('Navigation failed: ' + e.message, 'error');
    });
  }

  // ── Context menu actions ─────────────────────────────────────────────────

  function onEditLabel(nodeId) {
    setCtxMenu(null);
    var node = stateRef.current.nodes.find(function(n) { return n.id === nodeId; });
    if (!node) return;
    var label = window.prompt('TOC label (blank to use heading text):', node.labelOverride || node.title || '');
    if (label === null) return;
    mutate('setLabelOverride', { nodeId: nodeId, label: label.trim() || null }, 'Label updated');
  }

  function onToggleExpand(nodeId) {
    setState(function(s) {
      return h({}, s, {
        nodes: s.nodes.map(function(n) {
          return n.id === nodeId ? h({}, n, { isExpanded: !n.isExpanded }) : n;
        })
      });
    });
    // Persist silently
    var cur = stateRef.current;
    var node = cur.nodes.find(function(n) { return n.id === nodeId; });
    if (!node) return;
    var expanded = cur.nodes.filter(function(n) {
      return n.id === nodeId ? !node.isExpanded : n.isExpanded;
    }).map(function(n) { return n.id; });
    rpc('saveUserPrefs', { prefs: { expandedNodeIds: expanded } }).catch(function() {});
  }

  // ── Derived values ────────────────────────────────────────────────────────

  var numbers = useMemo(function() {
    return computeNumbers(state.nodes, state.config.numberingScheme);
  }, [state.nodes, state.config.numberingScheme]);

  var childMap = useMemo(function() {
    return buildChildMap(state.nodes);
  }, [state.nodes]);

  var searchLower = search.toLowerCase().trim();
  var staleCount = state.nodes.filter(function(n) { return n.status === 'stale'; }).length;
  var orphans = state.nodes.filter(function(n) { return n.status === 'orphaned'; });

  var syncBarCls = 'sync-bar' + (staleCount > 0 || orphans.length > 0 ? ' warn' : '') + (state.error ? ' error' : '');
  var syncBarText = state.syncing ? 'Syncing…'
    : state.error ? 'Sync failed — click ↻'
    : staleCount > 0 ? ('Up to date · ' + staleCount + ' stale')
    : timeSince(state.syncedAt);

  // ── Node renderer ─────────────────────────────────────────────────────────

  function renderNode(node, depth) {
    var hasKids = !!(childMap[node.id] && childMap[node.id].length > 0);
    var isOrph = node.status === 'orphaned';
    var isStale = node.status === 'stale';
    var isBusy = busyId === node.id || busyId === '__any__';
    var isEdit = editing === node.id;
    var isDrag = dragging === node.id;
    var dt = dropTarget && dropTarget.nodeId === node.id ? dropTarget : null;

    var label = node.labelOverride || node.title;
    if (searchLower && !label.toLowerCase().includes(searchLower)) {
      if (!hasKids) return null;
    }

    var indent = depth * 14 + 6;

    var rowCls = 'node-row'
      + (isDrag ? ' dragging' : '')
      + (dt ? ' drop-' + dt.position : '');

    var labelCls = 'node-label'
      + (isOrph ? ' orphaned' : '')
      + (node.labelOverride ? ' override' : '');

    return h(Fragment, { key: node.id },
      h('div', {
        class: rowCls,
        style: { paddingLeft: indent + 'px' },
        draggable: !isOrph && !isBusy,
        onDragStart:  function(e) { onDragStart(e, node.id); },
        onDragOver:   function(e) { onDragOver(e, node.id); },
        onDragLeave:  onDragLeave,
        onDrop:       function(e) { onDrop(e, node.id); },
        onDragEnd:    onDragEnd
      },
        !isOrph && h('span', { class: 'drag-handle' }, '⠿'),

        h('span', {
          class: 'toggle ' + (hasKids ? 'has-children' : 'leaf'),
          onClick: hasKids ? function() { onToggleExpand(node.id); } : null
        }, hasKids ? (node.isExpanded ? '▾' : '▸') : ''),

        isStale && h('span', {
          class: 'status-icon stale',
          title: 'Heading changed in document',
          onClick: function(e) {
            e.stopPropagation();
            var r = e.target.getBoundingClientRect();
            setStalePop({ node: node, x: r.left, y: r.bottom + 4 });
          }
        }, '⚠'),

        isOrph && h('span', {
          class: 'status-icon orphaned',
          title: 'Heading deleted from document'
        }, '⚠'),

        numbers[node.id] && h('span', { class: 'node-num' }, numbers[node.id]),

        isEdit
          ? h(EditInput, {
              key: 'edit-' + node.id,
              init: label,
              onConfirm: function(v) { onRenameConfirm(node.id, v); },
              onCancel: function() { setEditing(null); }
            })
          : h('span', {
              class: labelCls,
              title: label,
              onClick: function() { onJumpTo(node.id); },
              onDblClick: function() { if (!isOrph && !isBusy) setEditing(node.id); }
            }, label),

        isBusy && h('span', { class: 'busy-dot' }),

        !isBusy && h('button', {
          class: 'options-btn',
          title: 'Options',
          onClick: function(e) {
            e.stopPropagation();
            var r = e.target.getBoundingClientRect();
            setCtxMenu({ node: node, x: r.left, y: r.bottom + 2 });
          }
        }, '⋮')
      ),

      hasKids && node.isExpanded
        ? childMap[node.id].map(function(c) { return renderNode(c, depth + 1); })
        : null
    );
  }

  var rootNodes = childMap['__root__'] || [];

  return h(Fragment, null,

    // ── Header
    h('div', { class: 'header' },
      h('span', { class: 'header-title' }, 'Mostly Organised'),
      h('button', {
        class: 'icon-btn', title: 'Refresh',
        onClick: forceSync
      },
        h('svg', { width: 15, height: 15, viewBox: '0 0 24 24', fill: 'currentColor',
            class: state.syncing ? 'spin' : '' },
          h('path', { d: 'M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z' })
        )
      )
    ),

    // ── Sync bar
    h('div', { class: syncBarCls }, syncBarText),

    // ── Toolbar
    h('div', { class: 'toolbar' },
      h('select', {
        class: 'scheme-select',
        value: state.config.numberingScheme,
        onChange: function(e) { onSchemeChange(e.target.value); }
      },
        h('option', { value: 'none' },    'No numbers'),
        h('option', { value: 'numeric' }, '1.1.1'),
        h('option', { value: 'legal' },   'I.A.1'),
        h('option', { value: 'outline' }, 'A.1.a')
      ),
      h('input', {
        class: 'search-input', type: 'text', placeholder: 'Search…',
        value: search,
        onInput: function(e) { setSearch(e.target.value); }
      })
    ),

    // ── Tree
    h('div', { class: 'tree' },
      state.loading
        ? h('div', { class: 'empty-state' }, 'Loading…')
        : state.error
        ? h('div', { class: 'empty-state' },
            state.error,
            h('br'), h('br'),
            h('button', { class: 'btn', style: { margin: '0 auto', display: 'block' }, onClick: load }, 'Retry')
          )
        : rootNodes.length === 0
        ? h('div', { class: 'empty-state' }, 'No headings found.\nApply Heading 1–6 styles in your document to build a TOC.')
        : rootNodes.map(function(n) { return renderNode(n, 0); }),

      orphans.length > 0 && h(Fragment, null,
        h('div', { class: 'orphan-divider' }),
        orphans.map(function(n) { return renderNode(n, 0); })
      )
    ),

    // ── Context menu
    ctxMenu && h(CtxMenu, {
      node: ctxMenu.node, x: ctxMenu.x, y: ctxMenu.y,
      onClose: function() { setCtxMenu(null); },
      onEditLabel: onEditLabel,
      onPromote:  function(id) { setCtxMenu(null); mutate('changeHeadingLevel', { nodeId: id, delta: -1 }, 'Heading promoted'); },
      onDemote:   function(id) { setCtxMenu(null); mutate('changeHeadingLevel', { nodeId: id, delta:  1 }, 'Heading demoted'); },
      onExclude:  function(id) { setCtxMenu(null); mutate('setExcluded', { nodeId: id, excluded: true }); },
      onOrphan:   function(id) { setCtxMenu(null); mutate('removeOrphan', { nodeId: id }); }
    }),

    // ── Stale popover
    stalePop && h(StalePop, {
      node: stalePop.node, x: stalePop.x, y: stalePop.y,
      onClose: function() { setStalePop(null); },
      onResolve: function(id, res) { setStalePop(null); mutate('resolveStale', { nodeId: id, resolution: res }); }
    }),

    // ── Toast
    toast && h('div', { class: 'toast show' + (toast.type === 'error' ? ' error' : '') }, toast.msg)
  );
}

// ── EditInput ─────────────────────────────────────────────────────────────

function EditInput(props) {
  var _v = useState(props.init);
  var val = _v[0]; var setVal = _v[1];
  var ref = useRef(null);
  useEffect(function() {
    if (ref.current) { ref.current.focus(); ref.current.select(); }
  }, []);
  return h('input', {
    ref: ref,
    class: 'label-input',
    value: val,
    onInput: function(e) { setVal(e.target.value); },
    onKeyDown: function(e) {
      if (e.key === 'Enter')  { e.preventDefault(); props.onConfirm(val); }
      if (e.key === 'Escape') props.onCancel();
    },
    onBlur: function() { props.onConfirm(val); }
  });
}

// ── Context menu ──────────────────────────────────────────────────────────

function CtxMenu(props) {
  var node = props.node;
  var isOrph = node.status === 'orphaned';
  return h('div', {
    class: 'ctx-menu',
    style: { left: props.x + 'px', top: props.y + 'px' },
    onMouseDown: function(e) { e.stopPropagation(); }
  },
    !isOrph && h(Fragment, null,
      h('div', { class: 'ctx-item', onClick: function() { props.onEditLabel(node.id); } }, 'Edit TOC label'),
      h('div', { class: 'ctx-sep' }),
      h('div', {
        class: 'ctx-item' + (node.level <= 1 ? ' off' : ''),
        onClick: node.level > 1 ? function() { props.onPromote(node.id); } : null
      }, 'Promote heading'),
      h('div', {
        class: 'ctx-item' + (node.level >= 6 ? ' off' : ''),
        onClick: node.level < 6 ? function() { props.onDemote(node.id); } : null
      }, 'Demote heading'),
      h('div', { class: 'ctx-sep' }),
      h('div', { class: 'ctx-item', onClick: function() { props.onExclude(node.id); } }, 'Exclude from TOC')
    ),
    isOrph && h('div', { class: 'ctx-item', onClick: function() { props.onOrphan(node.id); } }, 'Remove orphan')
  );
}

// ── Stale popover ─────────────────────────────────────────────────────────

function StalePop(props) {
  var node = props.node;
  var safeX = Math.min(props.x, window.innerWidth - 250);
  return h('div', {
    class: 'stale-pop',
    style: { left: safeX + 'px', top: props.y + 'px' },
    onMouseDown: function(e) { e.stopPropagation(); }
  },
    h('p', null, 'Heading was changed in the document.'),
    h('p', null, h('strong', null, 'In document: '), node.title),
    node.syncedTitle && node.syncedTitle !== node.title &&
      h('p', null, h('strong', null, 'Last known: '), node.syncedTitle),
    h('div', { class: 'stale-actions' },
      h('button', { class: 'btn primary', onClick: function() { props.onResolve(node.id, 'accept'); } }, 'Accept'),
      node.syncedTitle && node.syncedTitle !== node.title &&
        h('button', { class: 'btn', onClick: function() { props.onResolve(node.id, 'restore'); } }, 'Restore'),
      h('button', { class: 'btn', onClick: props.onClose }, 'Dismiss')
    )
  );
}

// ── Mount ──────────────────────────────────────────────────────────────────

render(h(App, null), document.getElementById('root'));
</script>
