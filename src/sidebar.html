<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostly Organised</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ffffff;
  --border:   #e0e0e0;
  --text:     #202124;
  --muted:    #5f6368;
  --accent:   #1a73e8;
  --amber:    #f29900;
  --red:      #d93025;
  --hover:    #f1f3f4;
  --drag-ok:  #1a73e8;
  --row-h:    30px;
  --font:     'Google Sans', Roboto, Arial, sans-serif;
}

body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
  flex-shrink: 0;
}
.header-title { font-weight: 600; font-size: 14px; flex: 1; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 4px; border-radius: 4px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sync bar */
.sync-bar {
  padding: 3px 12px 5px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 20px;
}
.sync-bar.warn  { color: var(--amber); }
.sync-bar.error { color: var(--red); }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.scheme-select {
  font-size: 12px; font-family: var(--font);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 6px; background: var(--bg); cursor: pointer;
}
.search-input {
  flex: 1; font-size: 12px; font-family: var(--font);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; outline: none;
}
.search-input:focus { border-color: var(--accent); }

/* Tree */
.tree { flex: 1; overflow-y: auto; padding: 4px 0 24px; }
.orphan-divider { height: 1px; background: var(--border); margin: 8px 10px; }
.empty-state {
  padding: 32px 16px; text-align: center;
  color: var(--muted); line-height: 1.6; white-space: pre-line;
}

/* Node row */
.node-row {
  display: flex; align-items: center;
  height: var(--row-h); padding-right: 4px;
  position: relative; user-select: none; cursor: default;
}
.node-row:hover { background: var(--hover); }
.node-row.dragging { opacity: 0.35; }

.node-row.drop-before::before {
  content: ''; position: absolute; top: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--drag-ok); border-radius: 1px; z-index: 1;
}
.node-row.drop-after::after {
  content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--drag-ok); border-radius: 1px; z-index: 1;
}
.node-row.drop-child { background: #e8f0fe; border-left: 2px solid var(--drag-ok); }

/* Drag handle */
.drag-handle {
  visibility: hidden; cursor: grab;
  color: var(--muted); padding: 0 3px; flex-shrink: 0;
  font-size: 12px; line-height: var(--row-h);
}
.node-row:hover .drag-handle { visibility: visible; }
.drag-handle:active { cursor: grabbing; }

/* Expand toggle */
.toggle {
  width: 16px; height: var(--row-h);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px; color: var(--muted);
}
.toggle.has-children { cursor: pointer; }
.toggle.leaf { color: transparent; }

/* Status icon */
.status-icon { font-size: 12px; margin-right: 3px; flex-shrink: 0; cursor: pointer; }
.status-icon.stale   { color: var(--amber); }
.status-icon.orphaned { color: var(--red); }

/* Number */
.node-num {
  color: var(--muted); font-size: 12px;
  margin-right: 4px; flex-shrink: 0; white-space: nowrap;
}

/* Label */
.node-label {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; line-height: var(--row-h); cursor: pointer;
}
.node-label.orphaned { text-decoration: line-through; color: var(--muted); }
.node-label.override { font-style: italic; }

/* Inline edit */
.label-input {
  flex: 1; font-size: 14px; font-family: var(--font);
  border: 1px solid var(--accent); border-radius: 2px;
  padding: 0 4px; height: 22px; outline: none;
}

/* Options button */
.options-btn {
  visibility: hidden; background: none; border: none;
  cursor: pointer; padding: 0 4px; color: var(--muted);
  font-size: 16px; line-height: var(--row-h);
  border-radius: 3px; flex-shrink: 0;
}
.node-row:hover .options-btn { visibility: visible; }
.options-btn:hover { background: var(--border); }

/* Validation panel */
.validation-panel {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.validation-header {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; cursor: pointer; user-select: none;
  font-size: 13px; color: var(--muted);
}
.validation-header:hover { background: var(--hover); }
.validation-header .badge {
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 8px;
  color: #fff; margin-left: auto;
}
.badge.error { background: var(--red); }
.badge.warning { background: var(--amber); }
.badge.info { background: var(--accent); }
.badge.ok { background: #34a853; }
.validation-list { padding: 0 10px 6px; }
.validation-item {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 6px; font-size: 12px; cursor: pointer;
  border-radius: 3px; line-height: 1.4;
}
.validation-item:hover { background: var(--hover); }
.validation-item.error .v-error-code { color: var(--red); font-weight: 600; }
.validation-item.warning .v-error-code { color: var(--amber); font-weight: 600; }
.validation-item.info .v-error-code { color: var(--accent); font-weight: 600; }
.v-error-code { flex-shrink: 0; }
.v-error-msg { flex: 1; color: var(--text); }
.validation-empty {
  padding: 6px 10px; font-size: 12px; color: #34a853;
}

/* Busy spinner */
.busy-dot {
  width: 12px; height: 12px; flex-shrink: 0;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}

/* Context menu */
.ctx-menu {
  position: fixed; z-index: 1000;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.13);
  padding: 4px 0; min-width: 188px;
}
.ctx-item { padding: 7px 16px; cursor: pointer; font-size: 14px; }
.ctx-item:hover { background: var(--hover); }
.ctx-item.off { color: var(--muted); cursor: default; pointer-events: none; }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* Stale popover */
.stale-pop {
  position: fixed; z-index: 1001;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.13);
  padding: 12px 14px; max-width: 238px;
  font-size: 13px; line-height: 1.5;
}
.stale-pop p { color: var(--muted); margin-bottom: 6px; }
.stale-pop strong { color: var(--text); }
.stale-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.btn {
  font-size: 12px; font-family: var(--font);
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--bg); color: var(--text);
}
.btn:hover { background: var(--hover); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: #1557b0; }

/* Toast */
.toast {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: #3c4043; color: #fff;
  padding: 7px 14px; border-radius: 4px;
  font-size: 13px; z-index: 2000;
  max-width: 230px; text-align: center;
  pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }
</style>
</head>
